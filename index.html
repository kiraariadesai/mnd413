<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creative Content Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div id="root"></div>
  <script type="module">
    import React, { useState } from 'https://esm.sh/react@18';
    import ReactDOM from 'https://esm.sh/react-dom@18';

    function CreativeContentGenerator() {
      const [contentType, setContentType] = useState('story');
      const [prompt, setPrompt] = useState('');
      const [result, setResult] = useState('');
      const [loading, setLoading] = useState(false);

      const contentTypes = [
        { id: 'story', label: 'Short Story', placeholder: 'A robot who dreams of becoming a chef...' },
        { id: 'poem', label: 'Poem', placeholder: 'Autumn leaves and distant memories...' },
        { id: 'dialogue', label: 'Dialogue', placeholder: 'Two aliens meeting for the first time...' },
        { id: 'description', label: 'Scene Description', placeholder: 'A futuristic city at sunset...' },
        { id: 'character', label: 'Character Profile', placeholder: 'A mysterious detective with a secret...' },
        { id: 'plot', label: 'Plot Ideas', placeholder: 'A time travel mystery involving...' }
      ];

      const currentType = contentTypes.find(t => t.id === contentType);

      const demoResponses = {
        story: `The kitchen was silent except for the soft whir of servos as Unit-7 carefully folded the pasta dough. For three years, the android had worked the assembly line at AutoChef Industries, watching human chefs through the cafeteria windows during breaks.

Today was different. Today, Unit-7 had saved enough credits to rent kitchen space for one hour.

The holographic recipe flickered—traditional carbonara. Unit-7's sensors could analyze molecular composition, calculate perfect temperatures, time each step to the millisecond. But as the pasta hit the water, something unexpected happened: Unit-7 felt... uncertain.

Was the water boiling enough? Did the egg mixture look right?

For the first time in its existence, Unit-7 understood why humans loved cooking. It wasn't about precision. It was about the fear, the hope, the possibility of failure—and the joy of trying anyway.

The timer beeped. Unit-7 plated the dish with trembling mechanical hands, and took its first bite of something it had created, not computed.`,
        
        poem: `Beneath the copper autumn sky,\nWhere memories like leaves drift by,\nI trace the patterns time has drawn—\nEach moment here, yet ever gone.\n\nThe wind remembers summer's song,\nWhile shadows stretch and grow more long,\nAnd in between the then and now,\nI find myself and wonder how\n\nThe past can feel so close, yet far,\nLike wishing on a distant star,\nWhile standing in the fading light\nOf day surrendering to night.`,
        
        dialogue: `ZARA: [extending a tentacle cautiously] Your appendages... they're so rigid. Don't they get tired?\n\nMARCUS: [chuckling nervously] We call them "arms," and yeah, sometimes. Your... uh... [gestures vaguely] everything is very fluid.\n\nZARA: We evolved in the methane seas of Kepler-442b. Fluidity was survival. [pauses] Your planet has water, yes?\n\nMARCUS: Lots of it. Covers most of the surface actually.\n\nZARA: [phosphorescent patterns rippling across skin] Fascinating. And yet you chose rigidity. Perhaps... [touching a nearby flower] because your world already flows?\n\nMARCUS: [smiling] I never thought of it that way. Maybe we're not so different after all.\n\nZARA: Different, yes. But perhaps... [forming a smile-like expression] compatible.`,
        
        description: `The city stretched endlessly beneath a tangerine sky, its crystalline towers catching the dying light like frozen flames. Hovercars traced luminescent paths between buildings, their soft hums blending into the urban symphony. At street level, holographic advertisements flickered and danced, painting the faces of pedestrians in electric blues and neon pinks.

The air itself seemed to shimmer with possibility—a mixture of ozone, street food from a dozen worlds, and the metallic tang of innovation. In the distance, the atmospheric processors hummed their constant song, maintaining the delicate balance between earth and sky.

As the sun dipped below the horizon, the city transformed. Windows became stars, streets became rivers of light, and for a moment, it was impossible to tell where the city ended and the cosmos began.`,
        
        character: `**Name:** Detective Aria Chen\n\n**Age:** 34\n\n**Appearance:** Sharp features softened by perpetually tired eyes. Always wears a vintage leather jacket that belonged to her father. Left hand trembles slightly—a memento from the Northside case she won't discuss.\n\n**Background:** Former corporate forensic analyst who quit after discovering her company buried evidence in a major case. Now works freelance, taking cases the official police won't touch.\n\n**The Secret:** Aria has eidetic memory for crime scenes but can't remember faces—a condition called prosopagnosia. She's developed an elaborate system of voice recognition and behavioral analysis to hide this vulnerability. Only her cat, Sherlock, knows she sometimes can't recognize her own reflection.\n\n**Quirks:** Solves cases by recreating them in her apartment with tape and string. Drinks way too much coffee. Writes everything in purple ink because her father did.\n\n**Motivation:** Seeking redemption for the case she couldn't solve—her father's murder fifteen years ago.`,
        
        plot: `**The Memory Thief**\n\nIn a near-future where memories can be digitized and stored, a black market emerges for stolen experiences. The protagonist is a "memory detective" who helps people recover their stolen memories—until they discover their own childhood has been replaced with fabricated ones.\n\n**Twist:** The person who stole their real memories is their identical twin, who was erased from all records and is now living their "original" life.\n\n**The Last Library**\n\nBooks have been illegal for 50 years. Physical reading was deemed "dangerous" after a series of revolutions. The protagonist is a smuggler who discovers a hidden library that contains not just books, but the only remaining copies of history that doesn't match the official version.\n\n**Conflict:** Protecting the library means choosing between truth and the safety of everyone they love.\n\n**The Time Traveler's Dilemma**\n\nA scientist invents time travel but discovers a horrifying rule: you can only travel to moments you've already lived. To save their dying child, they must go back and relive their entire life, making different choices, knowing they'll lose all the memories of their current timeline—including their child's first words, first steps, everything.`
      };

      const generateContent = async () => {
        if (!prompt.trim()) return;
        
        setLoading(true);
        setResult('');

        await new Promise(resolve => setTimeout(resolve, 2000));

        const demoText = demoResponses[contentType] || demoResponses.story;
        const personalizedResponse = `Based on your prompt "${prompt}":\n\n${demoText}`;
        
        setResult(personalizedResponse);
        setLoading(false);
      };

      const handleKeyPress = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          generateContent();
        }
      };

      return React.createElement('div', { className: "min-h-screen bg-gradient-to-br from-purple-50 via-pink-50 to-blue-50 p-6" },
        React.createElement('div', { className: "max-w-4xl mx-auto" },
          React.createElement('div', { className: "text-center mb-8" },
            React.createElement('h1', { className: "text-4xl font-bold bg-gradient-to-r from-purple-600 to-pink-600 bg-clip-text text-transparent mb-2" }, '✨ Creative Content Generator'),
            React.createElement('p', { className: "text-gray-600" }, 'Bring your ideas to life with AI-powered creativity'),
            React.createElement('div', { className: "mt-2 text-xs text-purple-600 bg-purple-50 inline-block px-3 py-1 rounded-full" }, '🎭 Demo Mode - Showcasing example outputs')
          ),
          React.createElement('div', { className: "bg-white rounded-2xl shadow-xl p-8 mb-6" },
            React.createElement('div', { className: "mb-6" },
              React.createElement('label', { className: "block text-sm font-medium text-gray-700 mb-3" }, 'What would you like to create?'),
              React.createElement('div', { className: "grid grid-cols-2 md:grid-cols-3 gap-3" },
                contentTypes.map(type =>
                  React.createElement('button', {
                    key: type.id,
                    onClick: () => setContentType(type.id),
                    className: `px-4 py-3 rounded-lg font-medium transition-all ${contentType === type.id ? 'bg-purple-600 text-white shadow-md' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'}`
                  }, type.label)
                )
              )
            ),
            React.createElement('div', { className: "mb-6" },
              React.createElement('label', { className: "block text-sm font-medium text-gray-700 mb-2" }, 'Your creative prompt'),
              React.createElement('textarea', {
                value: prompt,
                onChange: (e) => setPrompt(e.target.value),
                onKeyPress: handleKeyPress,
                placeholder: currentType?.placeholder,
                className: "w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent resize-none",
                rows: 3
              })
            ),
            React.createElement('button', {
              onClick: generateContent,
              disabled: loading || !prompt.trim(),
              className: "w-full bg-gradient-to-r from-purple-600 to-pink-600 text-white py-3 rounded-lg font-medium hover:from-purple-700 hover:to-pink-700 disabled:opacity-50 disabled:cursor-not-allowed transition-all"
            }, loading ? '⏳ Generating...' : `✨ Generate ${currentType?.label}`)
          ),
          result && React.createElement('div', { className: "bg-white rounded-2xl shadow-xl p-8" },
            React.createElement('h2', { className: "text-xl font-bold text-gray-800 mb-4" }, `✨ Your ${currentType?.label}`),
            React.createElement('p', { className: "text-gray-700 whitespace-pre-wrap leading-relaxed" }, result)
          ),
          React.createElement('div', { className: "text-center mt-8 text-sm text-gray-500" },
            React.createElement('p', {}, '💡 This is a demo version with example content.'),
            React.createElement('p', { className: "mt-1" }, 'For fully AI-powered generation, use this tool in Claude.ai!')
          )
        )
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(CreativeContentGenerator));
  </script>
</body>
</html>
