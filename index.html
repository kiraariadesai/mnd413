function scoreOutfit(outfit, answers) {
  let score = 0;
  if (answers.aesthetic?.some((aesthetic) => outfit.aesthetics.includes(aesthetic))) score += 4;
  if (answers.color?.some((color) => outfit.colors.includes(color))) score += 2;
  if (answers.formality?.some((formality) => outfit.formality.includes(formality))) score += 3;
  if (answers.season?.some((season) => outfit.seasons.includes(season))) score += 2;
  return score;
}

function getStyleMatches(answers, count = 4) {
  const scored = OUTFIT_LIBRARY.map(o => ({ outfit: o, score: scoreOutfit(o, answers) }));
  scored.sort((a, b) => b.score - a.score);
  const topScore = scored[0].score;
  const contenders = scored.filter(s => s.score >= Math.max(topScore - 2, 3));
  const shuffled = contenders.sort(() => Math.random() - 0.5);
  return shuffled.slice(0, count).map(s => s.outfit);
}

function getEventMatches(eventTypes = [], styleAnswers = [], count = 3) {
  const eventMap = {
    wedding: { formality: "formal", aesthetics: ["classic", "romantic"] },
    interview: { formality: "formal", aesthetics: ["classic", "minimalist", "preppy"] },
    date: { formality: "smart-casual", aesthetics: ["classic", "minimalist", "romantic"] },
    party: { formality: "formal", aesthetics: ["minimalist", "classic", "y2k"] },
    concert: { formality: "casual", aesthetics: ["streetwear", "grunge", "y2k"] },
    gallery: { formality: "smart-casual", aesthetics: ["minimalist", "streetwear", "classic"] },
    brunch: { formality: "casual", aesthetics: ["classic", "minimalist", "coastal"] },
    outdoors: { formality: "casual", aesthetics: ["streetwear", "utility", "boho"] },
  };
  const targets = eventTypes.map((eventType) => eventMap[eventType]).filter(Boolean);
  const targetFormalities = targets.length
    ? [...new Set(targets.map((target) => target.formality))]
    : ["smart-casual"];
  const targetAesthetics = [...new Set(targets.flatMap((target) => target.aesthetics))];
  const scored = OUTFIT_LIBRARY.map(o => {
    let score = 0;
    if (targetFormalities.some((formality) => o.formality.includes(formality))) score += 4;
    if (targetAesthetics.some((aesthetic) => o.aesthetics.includes(aesthetic))) score += 3;
    if (styleAnswers.some((style) => o.aesthetics.includes(style))) score += 2;
    return { outfit: o, score };
  });
  scored.sort((a, b) => b.score - a.score);
  const topScore = scored[0].score;
  const contenders = scored.filter(s => s.score >= Math.max(topScore - 2, 4));
  const shuffled = contenders.sort(() => Math.random() - 0.5);
  return shuffled.slice(0, count).map(s => s.outfit);
}

  const [savedItems, setSavedItems] = useState([]);
  const [totalImpact, setTotalImpact] = useState({ water: 0, co2: 0, items: 0 });
  const hasSelections = (answers) => Object.values(answers).some((value) => Array.isArray(value) && value.length > 0);

  const getStyleRecs = () => {
    if (!styleAnswers.aesthetic.length) return;
    setRecommendations({ type: "style", outfits: getStyleMatches(styleAnswers) });
  };
  const getEventRecs = () => {
    if (!eventAnswers.event.length) return;
    setRecommendations({
      type: "event",
      eventType: eventAnswers.event,
      outfits: getEventMatches(eventAnswers.event, eventAnswers.style),
    });
  };
  const resetStyle = () => { setStyleAnswers(STYLE_DEFAULTS); setRecommendations(null); };
  const resetEvent = () => { setEventAnswers(EVENT_DEFAULTS); setRecommendations(null); };
  const resetRemix = () => { setRemixPiece([]); setRemixCustomPiece(""); setRecommendations(null); };

  const getRemixIdeas = () => {
    const customLabel = remixCustomPiece.trim();
    if (!remixPiece.length && !customLabel) return;
    const ideas = remixPiece.flatMap((piece) =>
      (REMIX_LIBRARY[piece] || []).map((idea) => ({ ...idea, piece })),
    );
    if (customLabel) {
      const safeCustomLabel = customLabel.toLowerCase();
      ideas.push(
        {
          piece: "custom",
          title: "Anchor + balance",
          recipe: `Style your ${safeCustomLabel} with a simple base (white tee, black tank, or button-down), then add one structured layer like a blazer or denim jacket.`,
          why: "When one item feels hard to style, neutral basics make it look intentional fast.",
        },
        {
          piece: "custom",
          title: "Repeat one color",
          recipe: `Pull one color from your ${safeCustomLabel} and repeat it in your shoes, bag, or jewelry so the outfit feels connected.`,
          why: "Repeating color is the easiest styling trick to make mixed pieces look cohesive.",

          title: "Dress it up / down test",

function QuizQuestion({ label, options, value, onChange }) {
  return (
    <div className="mb-5">
      <label className="text-xs uppercase tracking-widest text-[#7a5c3a] font-bold mb-2 block">{label}</label>
      <div className="flex flex-wrap gap-1.5">
        {options.map((opt) => {
          const selected = Array.isArray(value) ? value.includes(opt.value) : value === opt.value;
          const handleOptionClick = () => {
            if (Array.isArray(value)) {
              const nextValue = selected
                ? value.filter((item) => item !== opt.value)
                : [...value, opt.value];
              onChange(nextValue);
              return;
            }
            onChange(opt.value);
          };
          return (
            <button key={opt.value} onClick={handleOptionClick}
              className={`text-xs px-3 py-2 border-2 border-[#3d2817] transition-all ${selected ? "bg-[#3d2817] text-[#f4ead5]" : "bg-[#f4ead5] text-[#3d2817] hover:bg-[#d4a574]"}`}>
              {opt.label}
            </button>
          );
        })}
      </div>
    </div>
  );
}

function OutfitCard({ outfit, index, onSave, shoppingLinks }) {
  const [saved, setSaved] = useState(false);
  const handleSave = () => { if (saved) return; onSave(outfit); setSaved(true); };
  return (
    <div className="bg-[#faf3e0] border-2 border-[#3d2817] p-6 relative" style={{ boxShadow: "4px 4px 0px 0px #3d2817" }}>
      <div className="absolute -top-3 -left-2 bg-[#3d2817] text-[#f4ead5] w-8 h-8 flex items-center justify-center font-black text-sm" style={{ transform: "rotate(-3deg)" }}>
        {String(index + 1).padStart(2, "0")}
      </div>
      <div className="flex items-start justify-between mb-4 flex-wrap gap-2">
        <div>
          <h3 className="display-font text-2xl font-black text-[#3d2817]">{outfit.name}</h3>
          <p className="text-xs uppercase tracking-widest text-[#7a5c3a] italic">{outfit.vibe}</p>
        </div>
        <button onClick={handleSave} disabled={saved}
          className={`text-xs uppercase tracking-widest font-bold px-3 py-1.5 border-2 border-[#3d2817] transition-all ${saved ? "bg-[#3d5a3d] text-[#f4ead5]" : "bg-[#d4a574] text-[#3d2817] hover:bg-[#3d2817] hover:text-[#f4ead5]"}`}>
          {saved ? "✓ Saved" : "Save look"}
        </button>
      </div>
      <ul className="mb-4 space-y-1.5">
        {outfit.pieces.map((piece, i) => (
          <li key={i} className="text-[#3d2817] flex gap-2"><span className="text-[#7a5c3a]">§</span><span>{piece}</span></li>

      <div className="border-t border-[#3d2817]/30 pt-3 mb-4">
        <p className="text-xs uppercase tracking-widest text-[#7a5c3a] font-bold mb-1">Thrift tip</p>

        <p className="text-xs uppercase tracking-widest text-[#7a5c3a] font-bold mb-2">Shop secondhand</p>

          {shoppingLinks(outfit.searchTerms).map((link) => (

        {outfit.searchTerms && (
          <p className="text-xs text-[#7a5c3a] italic mt-2">Try searching: "{outfit.searchTerms.join('", "')}"</p>
        )}
      </div>

  );
}

    <div className="bg-[#faf3e0] border-2 border-[#3d2817] p-6" style={{ boxShadow: "4px 4px 0px 0px #3d2817" }}>
      <div className="text-3xl mb-3 text-[#3d5a3d]">❦</div>
      <p className="text-xs uppercase tracking-widest text-[#7a5c3a] font-bold mb-1">{label}</p>
      <p className="display-font text-5xl font-black text-[#3d2817] leading-none">{value}</p>
      <p className="text-xs uppercase tracking-widest text-[#7a5c3a] mt-1 mb-3">{unit}</p>
      <p className="text-xs text-[#5c4028] italic border-t border-[#3d2817]/30 pt-3">{context}</p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
