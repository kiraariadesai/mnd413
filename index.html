<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creative Content Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div id="root"></div>
  <script type="module">
    import React, { useState } from 'https://esm.sh/react@18';
    import ReactDOM from 'https://esm.sh/react-dom@18';

    function CreativeContentGenerator() {
      const [contentType, setContentType] = useState('story');
      const [prompt, setPrompt] = useState('');
      const [result, setResult] = useState('');
      const [loading, setLoading] = useState(false);
      const [apiKey, setApiKey] = useState('');
      const [apiKeySet, setApiKeySet] = useState(false);

      const contentTypes = [
        { id: 'story', label: 'Short Story', placeholder: 'A robot who dreams of becoming a chef...' },
        { id: 'poem', label: 'Poem', placeholder: 'Autumn leaves and distant memories...' },
        { id: 'dialogue', label: 'Dialogue', placeholder: 'Two aliens meeting for the first time...' },
        { id: 'description', label: 'Scene Description', placeholder: 'A futuristic city at sunset...' },
        { id: 'character', label: 'Character Profile', placeholder: 'A mysterious detective with a secret...' },
        { id: 'plot', label: 'Plot Ideas', placeholder: 'A time travel mystery involving...' }
      ];

      const currentType = contentTypes.find(t => t.id === contentType);

      const generateContent = async () => {
        if (!prompt.trim()) return;
        setLoading(true);
        setResult('');

        try {
          const response = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: { 
              "Content-Type": "application/json",
              "x-api-key": apiKey,
              "anthropic-version": "2023-06-01"
            },
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514",
              max_tokens: 1000,
              messages: [{
                role: "user",
                content: `You are a creative writing assistant. Generate a ${contentType} based on this prompt: "${prompt}". Be creative, engaging, and match the style of a ${contentType}. Keep it concise but compelling (around 200-300 words).`
              }]
            })
          });

          const data = await response.json();
          
          if (data.error) {
            setResult(`Error: ${data.error.message || 'Invalid API key or request failed'}`);
            return;
          }
          
          const textContent = data.content.filter(item => item.type === "text").map(item => item.text).join("\n");
          setResult(textContent);
        } catch (error) {
          setResult("Sorry, something went wrong. Please check your API key and try again.");
          console.error("Error:", error);
        } finally {
          setLoading(false);
        }
      };

      if (!apiKeySet) {
        return React.createElement('div', { className: "min-h-screen bg-gradient-to-br from-purple-50 via-pink-50 to-blue-50 p-6 flex items-center justify-center" },
          React.createElement('div', { className: "bg-white rounded-2xl shadow-xl p-8 max-w-md w-full" },
            React.createElement('h1', { className: "text-3xl font-bold text-center bg-gradient-to-r from-purple-600 to-pink-600 bg-clip-text text-transparent mb-4" }, '🔑 API Key Required'),
            React.createElement('p', { className: "text-gray-600 mb-4 text-sm" }, 
              'To use this tool, you need an Anthropic API key. Get one at console.anthropic.com'
            ),
            React.createElement('input', {
              type: 'password',
              value: apiKey,
              onChange: (e) => setApiKey(e.target.value),
              placeholder: 'sk-ant-...',
              className: "w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent mb-4"
            }),
            React.createElement('button', {
              onClick: () => apiKey.trim() && setApiKeySet(true),
              disabled: !apiKey.trim(),
              className: "w-full bg-gradient-to-r from-purple-600 to-pink-600 text-white py-3 rounded-lg font-medium hover:from-purple-700 hover:to-pink-700 disabled:opacity-50 disabled:cursor-not-allowed"
            }, 'Start Creating'),
            React.createElement('p', { className: "text-xs text-gray-500 mt-4 text-center" }, 
              '⚠️ Your API key is stored locally in your browser only'
            )
          )
        );
      }

      return React.createElement('div', { className: "min-h-screen bg-gradient-to-br from-purple-50 via-pink-50 to-blue-50 p-6" },
        React.createElement('div', { className: "max-w-4xl mx-auto" },
          React.createElement('div', { className: "text-center mb-8" },
            React.createElement('h1', { className: "text-4xl font-bold bg-gradient-to-r from-purple-600 to-pink-600 bg-clip-text text-transparent mb-2" }, '✨ Creative Content Generator'),
            React.createElement('p', { className: "text-gray-600" }, 'Bring your ideas to life with AI-powered creativity')
          ),
          React.createElement('div', { className: "bg-white rounded-2xl shadow-xl p-8 mb-6" },
            React.createElement('div', { className: "mb-6" },
              React.createElement('label', { className: "block text-sm font-medium text-gray-700 mb-3" }, 'What would you like to create?'),
              React.createElement('div', { className: "grid grid-cols-2 md:grid-cols-3 gap-3" },
                contentTypes.map(type =>
                  React.createElement('button', {
                    key: type.id,
                    onClick: () => setContentType(type.id),
                    className: `px-4 py-3 rounded-lg font-medium transition-all ${contentType === type.id ? 'bg-purple-600 text-white shadow-md' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'}`
                  }, type.label)
                )
              )
            ),
            React.createElement('div', { className: "mb-6" },
              React.createElement('label', { className: "block text-sm font-medium text-gray-700 mb-2" }, 'Your creative prompt'),
              React.createElement('textarea', {
                value: prompt,
                onChange: (e) => setPrompt(e.target.value),
                placeholder: currentType?.placeholder,
                className: "w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent resize-none",
                rows: 3
              })
            ),
            React.createElement('button', {
              onClick: generateContent,
              disabled: loading || !prompt.trim(),
              className: "w-full bg-gradient-to-r from-purple-600 to-pink-600 text-white py-3 rounded-lg font-medium hover:from-purple-700 hover:to-pink-700 disabled:opacity-50 disabled:cursor-not-allowed transition-all"
            }, loading ? '⏳ Generating...' : `✨ Generate ${currentType?.label}`)
          ),
          result && React.createElement('div', { className: "bg-white rounded-2xl shadow-xl p-8" },
            React.createElement('h2', { className: "text-xl font-bold text-gray-800 mb-4" }, `✨ Your ${currentType?.label}`),
            React.createElement('p', { className: "text-gray-700 whitespace-pre-wrap leading-relaxed" }, result)
          )
        )
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(CreativeContentGenerator));
  </script>
</body>
</html>
